<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overwatch カスタムマッチチーム振り分けツール</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --warning-color: #fd7e14;
            --danger-color: #dc3545;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; color: var(--primary-color); margin-bottom: 20px; }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 15px;
            background: #f1f3f5;
            border-radius: 8px;
        }

        .section-box {
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1em;
            color: var(--secondary-color);
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tiles-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .member-tile {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            height: 80px;
            transition: transform 0.2s;
            cursor: pointer;
            border: 2px solid #dee2e6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            padding: 5px;
            box-sizing: border-box;
            user-select: none;
        }

        .member-tile:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .state-0 { background-color: #adb5bd; border-color: #868e96; }
        .state-1 { background-color: #007bff; border-color: #0056b3; }
        .state-2 { background-color: #28a745; border-color: #1e7e34; }
        .state-3 { background-color: #fd7e14; border-color: #d96a0b; }
        .state-4 { background-color: #dc3545; border-color: #bd2130; }

        .status-label {
            font-size: 0.7em;
            margin-bottom: 2px;
            opacity: 0.9;
            background: rgba(0,0,0,0.1);
            padding: 1px 6px;
            border-radius: 4px;
        }

        .rate-display {
            font-size: 0.75em;
            font-weight: normal;
            opacity: 0.8;
            margin-top: 2px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:disabled { background: #ccc; cursor: default; opacity: 0.6; }
        .btn-success { background: var(--success-color); width: 100%; font-size: 1.2em; margin-top: 10px; }
        .btn-info { background: #17a2b8; }
        .btn-secondary { background: var(--secondary-color); }
        .btn-danger { background: var(--danger-color); }
        .btn-toggle-active { background: #6610f2; }

        .result-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .group-box {
            border: 2px solid var(--primary-color);
            padding: 15px;
            border-radius: 10px;
            background: #fff;
        }

        /* チーム2用の赤色スタイル */
        .group-box.team2 {
            border-color: var(--danger-color);
        }

        .group-box h3 {
            margin-top: 0;
            text-align: center;
            color: var(--primary-color);
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .group-box.team2 h3 {
            color: var(--danger-color);
        }

        .member-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rate-tag {
            font-size: 0.85em;
            color: #666;
            background: #f1f3f5;
            padding: 2px 8px;
            border-radius: 12px;
        }

        .add-player-mini {
            display: flex;
            gap: 8px;
            background: #eee;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            align-items: center;
            justify-content: center;
        }
        
        .add-player-mini input {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 180px;
            font-size: 0.9em;
        }
        
        .add-player-mini select {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 120px;
            font-size: 0.9em;
        }

        .btn-mini {
            padding: 6px 15px;
            font-size: 0.9em;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 10px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .modal-title {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 15px;
        }

        .modal-body {
            margin-bottom: 20px;
            color: #555;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Overwatch カスタムマッチチーム振り分けツール</h2>

    <div class="controls">
        <button class="btn btn-info" onclick="document.getElementById('fileInput').click()">リストを読込 (.txt)</button>
        <input type="file" id="fileInput" style="display:none" accept=".txt" onchange="loadData(this)">
        <button class="btn btn-secondary" onclick="saveData()">リストを保存 (.txt)</button>
        <button class="btn btn-danger" onclick="showClearAllModal()">全データ削除</button>
        <button id="toggleSimpleBtn" class="btn btn-secondary" onclick="toggleSimpleView()">簡易表示</button>
    </div>

    <div class="add-player-mini">
        <input type="text" id="newName" placeholder="プレイヤー名(入力で追加/削除)" maxlength="20">
        <select id="newRate">
            <option value="0">ブロンズ</option>
            <option value="1">シルバー</option>
            <option value="2">ゴールド</option>
            <option value="3" selected>プラチナ</option>
            <option value="4">ダイヤ</option>
            <option value="5">マスター</option>
            <option value="6">グラマス</option>
            <option value="7">チャンプ</option>
        </select>
        <button class="btn btn-mini" style="background: var(--primary-color);" onclick="addMember()">登録 / 更新</button>
        <button class="btn btn-danger btn-mini" onclick="showRemoveModal()">削除</button>
        <button class="btn btn-warning btn-mini" style="margin-left: 10px; background: var(--warning-color);" onclick="autoSelectMembers()">自動選択</button>
        <button class="btn btn-secondary btn-mini" onclick="clearSelectedMembers()">選択クリア</button>
        <button id="undoBtn" class="btn btn-secondary btn-mini" style="margin-left: 8px; background: #6c757d;" onclick="undoLastState()" disabled>ひとつ前に戻す</button>
    </div>

    <div class="section-box">
        <div class="section-title">
            <span>参加者選択 (合計10名)</span>
            <span id="counter" style="color: var(--success-color); font-size: 1.2em;">0 / 10</span>
        </div>
        <div id="tilesContainer" class="tiles-container"></div>
        <button id="calcBtn" class="btn btn-success" onclick="generateTeams()" disabled>チームを振り分ける</button>
    </div>

    <div id="resultArea" class="result-area" style="display: none;">
        <div class="group-box">
            <h3>チーム 1</h3>
            <div id="team1List"></div>
            <div id="team1Avg" style="text-align: right; margin-top: 12px; font-weight: bold; color: #444;"></div>
        </div>
        <div class="group-box team2">
            <h3>チーム 2</h3>
            <div id="team2List"></div>
            <div id="team2Avg" style="text-align: right; margin-top: 12px; font-weight: bold; color: #444;"></div>
        </div>
    </div>
</div>

<div id="customModal" class="modal-overlay">
    <div class="modal-content">
        <div id="modalTitle" class="modal-title">確認</div>
        <div id="modalBody" class="modal-body"></div>
        <div class="modal-actions">
            <button id="modalCancelBtn" class="btn btn-secondary btn-mini" onclick="closeModal()">キャンセル</button>
            <button id="modalConfirmBtn" class="btn btn-danger btn-mini">OK</button>
        </div>
    </div>
</div>

<script>
    let members = [];
    let isSimplified = false; 
    let lastStates = null; 
    let hasUnsavedChanges = false; // 保存されていない変更があるかどうかのフラグ

    const rateLabels = ["ブロンズ", "シルバー", "ゴールド", "プラチナ", "ダイヤ", "マスター", "グラマス", "チャンプ"];
    const stateLabels = ["未参加", "未選択", "選択", "休憩", "確定"];

    const BASE_WEIGHT = 1.6;

    // 画面離脱前の警告
    window.addEventListener('beforeunload', (event) => {
        if (members.length > 0 && hasUnsavedChanges) {
            // 標準的な警告ダイアログを表示
            event.preventDefault();
            event.returnValue = ''; 
        }
    });

    const shuffleArray = (array) => {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    };

    function showModal(title, body, confirmCallback, isWarning = true) {
        const modal = document.getElementById('customModal');
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerText = body;
        const confirmBtn = document.getElementById('modalConfirmBtn');
        const cancelBtn = document.getElementById('modalCancelBtn');

        confirmBtn.className = isWarning ? "btn btn-danger btn-mini" : "btn btn-info btn-mini";
        cancelBtn.style.display = 'inline-block';
        
        confirmBtn.onclick = () => {
            confirmCallback();
            closeModal();
        };
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('customModal').style.display = 'none';
    }

    function showMessage(title, body) {
        const modal = document.getElementById('customModal');
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalBody').innerText = body;
        document.getElementById('modalCancelBtn').style.display = 'none';
        document.getElementById('modalConfirmBtn').onclick = closeModal;
        modal.style.display = 'flex';
    }

    function toggleSimpleView() {
        isSimplified = !isSimplified;
        const btn = document.getElementById('toggleSimpleBtn');
        if (isSimplified) {
            btn.innerText = "全表示に戻す";
            btn.classList.add('btn-toggle-active');
            btn.classList.remove('btn-secondary');
        } else {
            btn.innerText = "簡易表示";
            btn.classList.remove('btn-toggle-active');
            btn.classList.add('btn-secondary');
        }
        render();
    }

    function render() {
        const container = document.getElementById('tilesContainer');
        container.innerHTML = "";
        
        let activeCount = 0;
        
        // 簡易表示がONなら「未参加(state 0)」を除外
        let filteredMembers = isSimplified 
            ? members.filter(m => m.state !== 0) 
            : members;

        // 名前順にソートして表示
        const sortedList = [...filteredMembers].sort((a, b) => a.name.localeCompare(b.name, 'ja'));

        sortedList.forEach(m => {
            const tile = document.createElement('div');
            tile.className = `member-tile state-${m.state}`;
            tile.innerHTML = `
                <span class="status-label">${stateLabels[m.state]}</span>
                <span style="display:block; width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:center;">${m.name}</span>
                <span class="rate-display">${rateLabels[m.rate]}</span>
            `;
            
            tile.onclick = () => {
                // 入力フォームに反映
                document.getElementById('newName').value = m.name;
                document.getElementById('newRate').value = m.rate;
                
                // 状態遷移
                rotateState(m.id);
            };

            container.appendChild(tile);
        });

        // カウントは全データから算出
        activeCount = members.filter(m => m.state === 2 || m.state === 4).length;

        document.getElementById('counter').innerText = `${activeCount} / 10`;
        document.getElementById('calcBtn').disabled = (activeCount !== 10);
        
        // 戻すボタンの有効化/無効化
        document.getElementById('undoBtn').disabled = !lastStates;
    }

    function addMember() {
        const nameInput = document.getElementById('newName');
        const name = nameInput.value.trim();
        if (!name) return;

        const rateValue = parseInt(document.getElementById('newRate').value);
        const existingIndex = members.findIndex(m => m.name === name);
        
        if (existingIndex !== -1) {
            members[existingIndex].rate = rateValue;
        } else {
            members.push({
                id: Date.now() + Math.random(),
                name: name,
                rate: rateValue,
                state: 0
            });
        }

        hasUnsavedChanges = true;
        nameInput.value = "";
        render();
    }

    function showRemoveModal() {
        const nameInput = document.getElementById('newName');
        const inputName = nameInput.value.trim();
        if (!inputName) {
            showMessage("削除方法", "名前入力欄に削除したいプレイヤー名を入力してから、削除ボタンを押してください。");
            return;
        }

        const index = members.findIndex(m => m.name === inputName);
        if (index !== -1) {
            showModal(
                "削除の確認",
                `「${inputName}」をリストから削除しますか？`,
                () => {
                    members.splice(index, 1);
                    hasUnsavedChanges = true;
                    nameInput.value = "";
                    render();
                }
            );
        } else {
            showMessage("未登録", `「${inputName}」というプレイヤーは見つかりませんでした。`);
        }
    }

    function showClearAllModal() {
        if (members.length === 0) return;
        showModal(
            "データ消去の確認",
            "登録されているすべての名簿データを消去します。よろしいですか？",
            () => {
                members = [];
                lastStates = null;
                hasUnsavedChanges = true;
                render();
            }
        );
    }

    function rotateState(id) {
        const m = members.find(x => x.id === id);
        if (!m) return;

        const nextStateMap = { 0:1, 1:2, 2:3, 3:4, 4:0 };
        let nextState = nextStateMap[m.state];

        if (isSimplified && nextState === 0) {
            nextState = 1;
        }

        if (nextState === 2 || nextState === 4) {
            const currentActive = members.filter(x => x.state === 2 || x.state === 4).length;
            if (currentActive >= 10) {
                if (nextState === 2) {
                    nextState = 3;
                } else if (nextState === 4) {
                    nextState = isSimplified ? 1 : 0;
                }
            }
        }
        
        m.state = nextState;
        hasUnsavedChanges = true;
        render();
    }

    function undoLastState() {
        if (!lastStates) return;
        
        members.forEach(m => {
            if (lastStates.hasOwnProperty(m.id)) {
                m.state = lastStates[m.id];
            } else {
                m.state = 1;
            }
        });

        hasUnsavedChanges = true;
        render();
    }

    function autoSelectMembers() {
        const eligiblePool = members.filter(m => m.state !== 0 && m.state !== 3);
        if (eligiblePool.length < 10) {
            showMessage("エラー", "選出可能なメンバーが10名未満です。\n(未参加・休憩以外が合計10名必要です)");
            return;
        }

        let selected = [];
        const fixedOnes = members.filter(m => m.state === 4);
        selected = [...fixedOnes];

        if (selected.length < 10) {
            const pool1 = shuffleArray(members.filter(m => m.state === 1));
            const needed = 10 - selected.length;
            selected = selected.concat(pool1.slice(0, needed));
        }

        if (selected.length < 10) {
            const pool2 = shuffleArray(members.filter(m => m.state === 2));
            const needed = 10 - selected.length;
            selected = selected.concat(pool2.slice(0, needed));
        }

        const selectedIds = new Set(selected.map(s => s.id));
        members.forEach(m => {
            if (selectedIds.has(m.id)) {
                if (m.state !== 4) m.state = 2;
            } else {
                if (m.state === 1 || m.state === 2) m.state = 1;
            }
        });

        hasUnsavedChanges = true;
        render();
    }

    function clearSelectedMembers() {
        members.forEach(m => {
            if (m.state === 2) {
                m.state = 1;
            }
        });
        hasUnsavedChanges = true;
        render();
    }

    function getPlayerScore(rate) {
        return Math.pow(BASE_WEIGHT, rate);
    }

    function getTeamHarmonicValue(team) {
        if (team.length === 0) return 0;
        const sumOfReciprocals = team.reduce((sum, m) => sum + (1 / getPlayerScore(m.rate)), 0);
        return team.length / sumOfReciprocals;
    }

    function getRateLabelFromValue(val) {
        const rateFloat = Math.log(val) / Math.log(BASE_WEIGHT);
        const rateInt = Math.floor(Math.max(0, rateFloat));
        return rateLabels[rateInt] || rateLabels[rateLabels.length - 1];
    }

    function generateTeams() {
        lastStates = {};
        members.forEach(m => {
            lastStates[m.id] = m.state;
        });

        const selectedMembers = shuffleArray(members.filter(m => m.state === 2 || m.state === 4));
        if (selectedMembers.length !== 10) {
            render();
            return;
        }

        let minDiff = Infinity;
        let bestTeam1 = [];

        function findBest(index, team1) {
            if (team1.length === 5) {
                const team2 = selectedMembers.filter(m => !team1.includes(m));
                const diff = Math.abs(getTeamHarmonicValue(team1) - getTeamHarmonicValue(team2));
                if (diff < minDiff) {
                    minDiff = diff;
                    bestTeam1 = [...team1];
                }
                return;
            }
            if (index >= 10) return;
            team1.push(selectedMembers[index]);
            findBest(index + 1, team1);
            team1.pop();
            findBest(index + 1, team1);
        }

        findBest(0, []);
        const team2 = selectedMembers.filter(m => !bestTeam1.includes(m));
        displayResult(bestTeam1, team2);
        render();
    }

    function displayResult(t1, t2) {
        const resultArea = document.getElementById('resultArea');
        resultArea.style.display = 'grid';

        const renderList = (team, listId, avgId) => {
            const list = document.getElementById(listId);
            list.innerHTML = "";
            const sorted = [...team].sort((a, b) => a.name.localeCompare(b.name, 'ja'));
            sorted.forEach(m => {
                const div = document.createElement('div');
                div.className = "member-item";
                div.innerHTML = `<span>${m.name}</span><span class="rate-tag">${rateLabels[m.rate]}</span>`;
                list.appendChild(div);
            });
            const harmonicVal = getTeamHarmonicValue(team);
            document.getElementById(avgId).innerText = "チーム実力レート: " + getRateLabelFromValue(harmonicVal);
        };

        renderList(t1, "team1List", "team1Avg");
        renderList(t2, "team2List", "team2Avg");
        resultArea.scrollIntoView({ behavior: 'smooth' });
    }

    function saveData() {
        if (members.length === 0) return;
        const lines = members.map(m => `${m.name},${rateLabels[m.rate]}`);
        const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "member_list.txt";
        a.click();
        
        // 保存したのでフラグを戻す
        hasUnsavedChanges = false;
    }

    function loadData(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split(/\r?\n/);
            const loaded = [];
            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length >= 2) {
                    const name = parts[0].trim();
                    const rateStr = parts[1].trim();
                    
                    let rateIdx = rateLabels.indexOf(rateStr);
                    if (rateIdx === -1) {
                        const num = parseInt(rateStr);
                        if (!isNaN(num) && num >= 0 && num <= 7) {
                            rateIdx = num;
                        } else {
                            rateIdx = 3;
                        }
                    }

                    if (name) {
                        loaded.push({ 
                            id: Date.now() + Math.random(), 
                            name: name, 
                            rate: rateIdx, 
                            state: 0 
                        });
                    }
                }
            });
            if (loaded.length > 0) {
                members = loaded;
                lastStates = null;
                hasUnsavedChanges = false; // 読み込み直後は保存済み扱い
                render();
            }
            input.value = "";
        };
        reader.readAsText(file);
    }

    render();
</script>
</body>
</html>
